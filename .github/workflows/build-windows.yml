name: Build Windows

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "scenes/**"
      - "assets/**"
      - "project.godot"
      - "export_presets.cfg"
      - ".github/workflows/build-windows.yml"

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.6.2"
  GD_CUBISM_TAG: "v0.9.1"
  SDK_URL: "https://cubism.live2d.com/sdk-native/bin/CubismSdkForNative-5-r.1.zip"

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scons
        shell: pwsh
        run: pip install "scons==4.7"

      - name: Clone gd_cubism + submodules
        shell: pwsh
        run: |
          git clone --depth 1 --branch $env:GD_CUBISM_TAG --recurse-submodules `
            https://github.com/MizunagiKB/gd_cubism.git vendor/gd_cubism

      - name: Cache gd_cubism build artifacts
        uses: actions/cache@v4
        with:
          path: |
            vendor/gd_cubism/godot-cpp/bin
            vendor/gd_cubism/godot-cpp/gen
            vendor/gd_cubism/src/*.os
            vendor/gd_cubism/src/private/*.os
            vendor/gd_cubism/thirdparty/CubismSdkForNative-*/Framework/src/**/*.os
            vendor/gd_cubism/demo/addons/gd_cubism/bin
            vendor/gd_cubism/.sconsign.dblite
          key: ${{ runner.os }}-gd_cubism-${{ env.GD_CUBISM_TAG }}-v3

      - name: Download Cubism SDK 5-r.1
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri $env:SDK_URL -OutFile sdk.zip
          Expand-Archive -Path sdk.zip -DestinationPath vendor/gd_cubism/thirdparty/
          Remove-Item sdk.zip
          Get-ChildItem vendor/gd_cubism/thirdparty/

      - name: Build gd_cubism (Windows x86_64)
        shell: pwsh
        working-directory: vendor/gd_cubism
        run: |
          scons platform=windows arch=x86_64 target=template_debug -j2
          scons platform=windows arch=x86_64 target=template_release -j2

      - name: Stage addons to project
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path addons
          Copy-Item -Recurse -Force vendor/gd_cubism/demo/addons/gd_cubism addons/
          # 把 Live2D Core DLL 也搬到 plugin bin（runtime 載入需要）
          $coreDll = "vendor/gd_cubism/thirdparty/CubismSdkForNative-5-r.1/Core/dll/windows/x86_64/Live2DCubismCore.dll"
          if (Test-Path $coreDll) {
            Copy-Item $coreDll addons/gd_cubism/bin/
          }
          Get-ChildItem addons/gd_cubism/bin/
          ## 讓 Godot 跳過整個 vendor/ 目錄（不掃描、不匯入）
          New-Item -ItemType File -Force -Path vendor/.gdignore | Out-Null
          Write-Host "Created vendor/.gdignore"

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Rename godot to godot.exe
        shell: pwsh
        run: |
          ## chickensoft setup-godot 安裝的 binary 沒副檔名 → Windows 無法直接 exec
          ## 改名後 PowerShell / cmd / bash 都能跑
          $src = $env:GODOT
          $dst = "$src.exe"
          if (-not (Test-Path $dst)) {
            Copy-Item $src $dst
            Write-Host "Copied $src to $dst"
          }
          & $dst --version

      - name: Import project (headless)
        shell: pwsh
        run: |
          $godot = $env:GODOT + ".exe"
          if (-not (Test-Path $godot)) { throw "godot.exe not found at $godot" }
          ## 用 Start-Process -Wait 強制等子程序結束(& 會被 godot detach 騙)
          ## 重定向到 file 才能等 — Out-Host pipe 在 .exe detach 場景仍可能丟失
          Remove-Item -Recurse -Force .godot -ErrorAction SilentlyContinue
          1..2 | ForEach-Object {
            Write-Host "=== import attempt $_ ==="
            $p = Start-Process -FilePath $godot `
              -ArgumentList "--headless","--path",(Resolve-Path .).Path,"--import" `
              -Wait -NoNewWindow -PassThru `
              -RedirectStandardOutput "godot_import_$_.log" -RedirectStandardError "godot_import_$_.err"
            Write-Host "exit=$($p.ExitCode)"
            if (Test-Path "godot_import_$_.log") { Get-Content "godot_import_$_.log" | Select-Object -Last 30 }
            if (Test-Path "godot_import_$_.err") {
              $err = Get-Content "godot_import_$_.err"
              if ($err) { Write-Host "--- stderr ---"; $err | Select-Object -Last 10 }
            }
          }
          if (-not (Test-Path .godot)) { throw "Import failed: .godot not generated" }
          Write-Host "=== .godot top-level ==="
          Get-ChildItem .godot | Format-Table -AutoSize

      - name: Export Windows Desktop
        shell: pwsh
        run: |
          $godot = $env:GODOT + ".exe"
          New-Item -ItemType Directory -Force -Path build | Out-Null
          $p = Start-Process -FilePath $godot `
            -ArgumentList "--headless","--path",(Resolve-Path .).Path,"--export-release","Windows Desktop",(Join-Path (Resolve-Path .).Path "build\DoroPet.exe") `
            -Wait -NoNewWindow -PassThru `
            -RedirectStandardOutput "godot_export.log" -RedirectStandardError "godot_export.err"
          Write-Host "export exit=$($p.ExitCode)"
          if (Test-Path "godot_export.log") { Get-Content "godot_export.log" | Select-Object -Last 60 }
          if (Test-Path "godot_export.err") {
            $err = Get-Content "godot_export.err"
            if ($err) { Write-Host "--- stderr ---"; $err | Select-Object -Last 30 }
          }
          if (-not (Test-Path "build\DoroPet.exe")) { throw "Export failed: build\DoroPet.exe missing" }
          Copy-Item -Recurse -Force addons\gd_cubism\bin\* build\
          Get-ChildItem build\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DoroPet-Windows-x86_64
          path: build/
          retention-days: 14
